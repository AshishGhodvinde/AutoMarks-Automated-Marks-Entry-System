<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoMarks | Next-Gen AI Mark Scanner</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="glass-bg"></div>
    <main class="container">
        <header>
            <h1 class="gradient-text">AutoMarks</h1>
            <p>Scan your marksheet using AI-powered digit recognition and EasyOCR.</p>
        </header>

        <section class="upload-section glass-panel">
            <form action="/upload" method="POST" enctype="multipart/form-data" id="uploadForm">
                
                <div class="input-group" style="margin-bottom: 2rem; text-align: left;">
                    <label for="rollNumber" style="display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-weight: 600;">Student Roll Number / Name</label>
                    <input type="text" name="roll_number" id="rollNumber" required placeholder="Enter uniquely identifiable Roll No." style="width: 100%; padding: 0.85rem 1rem; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); color: white; font-size: 1.1rem; outline: none; transition: border 0.2s;" onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--glass-border)'">
                </div>

                <div class="drop-zone" id="dropZone">
                    <div class="icon-camera"></div>
                    <h2>Upload or Capture Marksheet</h2>
                    <p>Drag & drop an image or use your phone's camera.</p>
                    <input type="file" name="file" id="fileInput" accept="image/*" capture="camera" required>
                    <button type="button" class="btn-primary" onclick="document.getElementById('fileInput').click()">Select Image</button>
                </div>
                <div id="previewContainer" class="hidden">
                    <img id="imagePreview" alt="Image Preview" style="max-height: 400px; object-fit: contain;"/>
                    <button type="submit" class="btn-success" style="width: 100%; margin-top: 1rem; padding: 1rem; font-size: 1.1rem;">Process Marks to Database</button>
                </div>
            </form>
            
            <div id="loadingOverlay" class="hidden">
                <div class="spinner"></div>
                <p>Analyzing grid layout & compiling database...</p>
            </div>

            <div id="resultSection" class="hidden" style="margin-top: 2rem;"></div>
        </section>
    </main>

    <script>
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const previewContainer = document.getElementById('previewContainer');
        const imagePreview = document.getElementById('imagePreview');
        const uploadForm = document.getElementById('uploadForm');
        const loadingOverlay = document.getElementById('loadingOverlay');
        
        // Generate a unique session ID per page load.
        // This ensures every website refresh creates a cleanly isolated folder of Excel files!
        const sessionId = 'session_' + Math.random().toString(36).substr(2, 9) + Date.now();

        fileInput.addEventListener('change', function(e) {
            handleFiles(this.files);
        });

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            fileInput.files = e.dataTransfer.files;
            handleFiles(e.dataTransfer.files);
        });

        function handleFiles(files) {
            if (files && files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    imagePreview.src = e.target.result;
                    dropZone.classList.add('hidden');
                    previewContainer.classList.remove('hidden');
                }
                reader.readAsDataURL(files[0]);
            }
        }

        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            loadingOverlay.classList.remove('hidden');
            
            const formData = new FormData(uploadForm);
            formData.append('session_id', sessionId);
            
            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'Accept': 'application/json'
                    }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    const resultHtml = `
                        <div style="background: rgba(0, 0, 0, 0.2); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--glass-border); margin-bottom: 2rem;">
                            <h3 style="color: var(--success); margin-bottom: 1rem; text-align: center;">Success! Recorded marks for Roll No. ${data.roll_number}</h3>
                            
                            <!-- Editable Marks Section -->
                            <div style="background: rgba(0, 0, 0, 0.3); padding: 1.5rem; border-radius: 8px; margin-bottom: 2rem;">
                                <h4 style="color: var(--text); margin-bottom: 1rem; text-align: center;">📝 Edit Marks (if needed)</h4>
                                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 1rem; margin-bottom: 1.5rem;">
                                    ${data.results.map((item, index) => `
                                        <div style="text-align: center;">
                                            <label style="display: block; color: var(--text-muted); font-size: 0.9rem; margin-bottom: 0.5rem;">${item.question}</label>
                                            <input type="text" 
                                                   id="mark_${index}" 
                                                   value="${item.mark}" 
                                                   maxlength="2" 
                                                   style="width: 100%; padding: 0.75rem; text-align: center; border-radius: 6px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.1); color: white; font-size: 1.1rem; font-weight: bold; outline: none; transition: all 0.2s;"
                                                   onfocus="this.style.borderColor='var(--accent)'; this.style.background='rgba(255,255,255,0.15)'"
                                                   onblur="this.style.borderColor='var(--glass-border)'; this.style.background='rgba(255,255,255,0.1)'"
                                                   onchange="updateTotal()">
                                        </div>
                                    `).join('')}
                                </div>
                                <div style="text-align: center; margin-top: 1rem;">
                                    <button onclick="saveEditedMarks()" class="btn-primary" style="padding: 0.75rem 2rem; font-size: 1rem;">💾 Save Edited Marks</button>
                                </div>
                            </div>
                            
                            <!-- Results Display -->
                            <div style="background: rgba(0, 0, 0, 0.3); padding: 1.5rem; border-radius: 8px; margin-bottom: 2rem;">
                                <h4 style="color: var(--text); margin-bottom: 1rem; text-align: center;">📊 Final Results</h4>
                                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 1rem; margin-bottom: 1.5rem;">
                                    ${data.results.map((item, index) => `
                                        <div style="text-align: center; padding: 1rem; background: rgba(255,255,255,0.05); border-radius: 6px;">
                                            <div style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 0.5rem;">${item.question}</div>
                                            <div id="display_${index}" style="font-size: 1.5rem; font-weight: bold; color: var(--text);">${item.mark}</div>
                                        </div>
                                    `).join('')}
                                </div>
                                <div style="text-align: center; padding: 1rem; background: rgba(0,255,0,0.1); border-radius: 8px; border: 1px solid rgba(0,255,0,0.3);">
                                    <div style="color: var(--text-muted); font-size: 1rem; margin-bottom: 0.5rem;">Total Obtained Marks</div>
                                    <div id="totalDisplay" style="font-size: 2rem; font-weight: bold; color: var(--success);">${data.total}</div>
                                    <div style="color: var(--text-muted); font-size: 0.9rem; margin-top: 0.5rem;">out of 20</div>
                                </div>
                            </div>
                        </div>
                        <h3 style="color: var(--text-muted); margin-bottom: 1rem; text-align: left; font-weight: 600; text-transform: uppercase;">Contour Vision (Debug)</h3>
                        <img src="/download/${sessionId}/${data.debug_img}" alt="Contour Map" style="width: 100%; border-radius: 12px; border: 1px solid var(--glass-border); margin-bottom: 2rem;">
                        <div style="text-align: center; margin-top: 2rem;">
                            <button onclick="exportEditedMarks()" class="btn-success" style="padding: 1rem 2rem; font-size: 1.1rem; margin-right: 1rem;">⬇ Export to Excel</button>
                            <button onclick="processNewImage()" class="btn-primary" style="padding: 1rem 2rem; font-size: 1.1rem;">📷 Process New Image</button>
                        </div>
                    `;
                    
                    document.getElementById('resultSection').innerHTML = resultHtml;
                    document.getElementById('resultSection').classList.remove('hidden');

                    // Store current data for editing
                    currentResults = data.results;
                    currentRollNumber = data.roll_number;
                    currentExcelFile = data.excel_file;
                    
                    // Initialize display values
                    currentResults.forEach((item, index) => {
                        const input = document.getElementById(`mark_${index}`);
                        const display = document.getElementById(`display_${index}`);
                        if (input) input.value = item.mark;
                        if (display) display.textContent = item.mark;
                    });
                    
                    // Reset upload for "continuous capture"
                    uploadForm.reset();
                    fileInput.value = "";
                    imagePreview.src = "";
                    previewContainer.classList.add('hidden');
                    dropZone.classList.remove('hidden');
                    
                    // Keep roll number but focus for easy overwrite
                    const rollInput = document.getElementById('rollNumber');
                    rollInput.value = data.roll_number;
                    rollInput.focus();
                } else {
                    alert("Error: " + (data.error || "Unknown error processing image."));
                }
            } catch (err) {
                alert("Request failed. Is the server running?");
                console.error(err);
            } finally {
                loadingOverlay.classList.add('hidden');
            }
        });
        
        // Global variables to store data
        let currentResults = [];
        let currentRollNumber = '';
        let currentExcelFile = '';
        
        // Function to update total when marks are edited
        function updateTotal() {
            let total = 0;
            currentResults.forEach((item, index) => {
                const input = document.getElementById(`mark_${index}`);
                const display = document.getElementById(`display_${index}`);
                const value = input.value.trim();
                
                // Validate input
                if (value === '' || value === '-') {
                    item.mark = '-';
                    display.textContent = '-';
                } else if (/^\d+$/.test(value) && parseInt(value) <= 10) {
                    item.mark = value;
                    display.textContent = value;
                    total += parseInt(value);
                } else {
                    // Invalid input - revert to original
                    input.value = item.mark;
                    display.textContent = item.mark;
                    if (item.mark !== '-' && /^\d+$/.test(item.mark)) {
                        total += parseInt(item.mark);
                    }
                }
            });
            
            document.getElementById('totalDisplay').textContent = total;
        }
        
        // Function to save edited marks
        async function saveEditedMarks() {
            try {
                const response = await fetch('/update_marks', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        roll_number: currentRollNumber,
                        results: currentResults,
                        excel_file: currentExcelFile,
                        session_id: sessionId
                    })
                });
                
                const data = await response.json();
                if (data.success) {
                    alert('✅ Marks updated successfully!');
                } else {
                    alert('❌ Error updating marks: ' + data.error);
                }
            } catch (err) {
                alert('❌ Failed to save marks. Please try again.');
                console.error(err);
            }
        }
        
        // Function to export edited marks to Excel
        // Function to download the entire accumulated session database Excel file
        async function exportEditedMarks() {
            try {
                // First save any pending edits on the screen before downloading the full database
                await fetch('/update_marks', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        roll_number: currentRollNumber,
                        results: currentResults,
                        excel_file: currentExcelFile,
                        session_id: sessionId
                    })
                });

                // Then trigger the download of the entire accumulated database for this session
                const downloadUrl = `/download/${sessionId}/${currentExcelFile}`;
                const a = document.createElement('a');
                a.href = downloadUrl;
                a.download = `marks_database_${sessionId}.xlsx`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            } catch (err) {
                alert('❌ Failed to export. Please try again.');
                console.error(err);
            }
        }
        
        // Function to process a new image
        function processNewImage() {
            document.getElementById('resultSection').classList.add('hidden');
            document.getElementById('uploadForm').reset();
            document.getElementById('fileInput').value = '';
            document.getElementById('rollNumber').value = currentRollNumber; // Keep roll number
            document.getElementById('rollNumber').focus();
        }
    </script>
</body>
</html>
